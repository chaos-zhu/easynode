name: mobile
description: "EasyNode mobile app."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  dio: ^5.7.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2
  pointycastle: ^3.9.1
  basic_utils: ^5.7.0
  dartssh2: ^2.12.0
  xterm: ^4.0.0
  uuid: ^4.5.1
  flutter_riverpod: ^2.5.1
  flutter_svg: ^2.2.4
  file_picker: ^11.0.2
  archive: ^4.0.9
  path_provider: ^2.1.5
  share_plus: ^12.0.2
  re_editor: ^0.8.0
  re_highlight: ^0.0.3
  photo_view: ^0.15.0
  video_player: ^2.9.2
  chewie: ^1.8.5

dependency_overrides:
  # video_player_android 2.9.x has a known Pigeon channel-error regression on
  # certain Android builds:
  #   PlatformException(channel-error, Unable to establish connection on
  #   channel: "dev.flutter.pigeon.video_player_android.AndroidVideoPlayerApi
  #   .createForTextureView", null, null)
  # Tracked upstream in flutter/flutter#175057 and #166831. Pin to the last
  # known-good 2.7.x release until the 2.9.x line stabilises.
  video_player_android: 2.7.16

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo_v2_01.png
    - assets/linux.svg
    - assets/windows.svg
