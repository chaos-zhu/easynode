name: easynode_native
description: "EasyNode native app."
publish_to: 'none'
version: 1.0.1+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  dio: ^5.7.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1
  flutter_secure_storage: ^9.2.2
  flutter_secure_storage_ohos:
    git:
      url: "https://gitcode.com/CPF-Flutter/fluttertpc_flutter_secure_storage.git"
      ref: "br_v9.2.4_ohos"
      path: "flutter_secure_storage_ohos"
  file_picker_ohos:
    git:
      url: "https://gitcode.com/CPF-Flutter/fluttertpc_file_picker.git"
      ref: "br_v10.3.8_ohos"
  shared_preferences: ^2.3.2
  pointycastle: ^3.9.1
  basic_utils: ^5.7.0
  dartssh2: ^2.12.0
  xterm: ^4.0.0
  uuid: ^4.5.1
  flutter_riverpod: ^2.5.1
  flutter_svg: ^2.2.4
  file_picker: ^11.0.2
  archive: ^4.0.9
  path_provider: ^2.1.5
  share_plus: ^12.0.2
  re_editor: ^0.9.0
  re_highlight: ^0.0.3
  photo_view: ^0.15.0
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.0
  socket_io_client: ^3.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  image_path: "assets/logo_v2_03.png"
  android: true
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  web:
    generate: true
    image_path: "assets/logo_v2_03.png"
    background_color: "#FFFFFF"
    theme_color: "#FFFFFF"
  windows:
    generate: true
    image_path: "assets/logo_v2_03.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "assets/logo_v2_03.png"

dependency_overrides:
  shared_preferences:
    git:
      url: "https://gitcode.com/CPF-Flutter/flutter_packages.git"
      path: "packages/shared_preferences/shared_preferences"
  path_provider:
    git:
      url: "https://gitcode.com/CPF-Flutter/flutter_packages.git"
      path: "packages/path_provider/path_provider"
  url_launcher:
    git:
      url: "https://gitcode.com/CPF-Flutter/flutter_packages.git"
      path: "packages/url_launcher/url_launcher"
  flutter_secure_storage:
    git:
      url: "https://gitcode.com/CPF-Flutter/fluttertpc_flutter_secure_storage.git"
      ref: "br_v9.2.4_ohos"
      path: "flutter_secure_storage"
  flutter_secure_storage_ohos:
    git:
      url: "https://gitcode.com/CPF-Flutter/fluttertpc_flutter_secure_storage.git"
      ref: "br_v9.2.4_ohos"
      path: "flutter_secure_storage_ohos"
  package_info_plus:
    git:
      url: "https://gitcode.com/CPF-Flutter/flutter_plus_plugins.git"
      ref: "br_package_info_plus-v8.1.0_ohos"
      path: "packages/package_info_plus/package_info_plus"
  share_plus:
    git:
      url: "https://gitcode.com/CPF-Flutter/flutter_plus_plugins.git"
      ref: "br_share_plus-v12.0.1_ohos"
      path: "packages/share_plus/share_plus"

flutter:
  uses-material-design: true
  assets:
    - assets/logo_v2_01.png
    - assets/plus.png
    - assets/docker.svg
    - assets/linux.svg
    - assets/windows.svg
